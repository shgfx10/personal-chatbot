<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Chatbot</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Chatbot</h2>
                <button id="clearBtn" title="New Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </div>
            <div class="model-select">
                <label for="model">Model</label>
                <select id="model"></select>
            </div>
            <div class="sidebar-footer">
                <p>Powered by Ollama</p>
            </div>
        </div>
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="welcome">
                    <h1>How can I help you?</h1>
                    <p>Start typing below. No restrictions, fully local.</p>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
                    <button id="sendBtn" title="Send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
